# Release gate — see docs/PRODUCTION.md
name: CI

on:
  push:
    branches: [main, master, develop, 'feature/**']
  pull_request:
    branches: [main, master, develop]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          cache: npm
      - run: npm ci
      - run: npm run ci
